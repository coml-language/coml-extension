name: Publish Extension To Marketplace [VSCODE]

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: coml-lsp
            suffix: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: coml-lsp.exe
            suffix: win32-x64

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build LSP
        run: cargo build --release --target ${{ matrix.target }} -p coml-lsp

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: lsp-${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Extension Dependencies
        working-directory: ./editors/vscode
        run: npm install

      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: editors/vscode/bin

      - name: Publish to Marketplace
        working-directory: ./editors/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p $VSCE_PAT