name: Publish Extension To Marketplace [VSCODE]

on:
    workflow_dispatch:

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      bin: coml-lsp
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      bin: coml-lsp.exe
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      bin: coml-lsp

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Build LSP
              run: cargo build --release --target ${{ matrix.target }} -p coml-lsp

            - name: Upload Binary
              uses: actions/upload-artifact@v4
              with:
                  name: lsp-${{ matrix.target }}
                  path: target/${{ matrix.target }}/release/${{ matrix.bin }}

    publish:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: editors/vscode/package-lock.json

            - name: Npm Install Dependencies
              working-directory: ./editors/vscode
              run: npm install

            - name: Publish to Marketplace
              working-directory: ./editors/vscode
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: npx @vscode/vsce publish -p $VSCE_PAT
