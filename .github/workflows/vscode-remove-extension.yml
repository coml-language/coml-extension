name: Remove Extension To Marketplace [vscode]

on:
    workflow_dispatch:

jobs:
  unpublish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install VSCE
        run: npm install -g @vscode/vsce

      - name: Unpublish Extension
        run: vsce unpublish -p ${{ secrets.VSCE_PAT }} coml-lang.coml-extension